<!DOCTYPE html>
<html>
<head>
<title>Spin & Win</title>
</head>
<body style="text-align:center;font-family:Arial;">
<h1>Spin & Win Game</h1>
<button onclick="spin()">SPIN</button>
<p id="result"></p>

<script>
function spin(){
let prizes=[10,20,50,100,5];
let win=prizes[Math.floor(Math.random()*prizes.length)];
document.getElementById("result").innerHTML="You Won "+win+" Coins!";
}
</script>

</body>
</html>
